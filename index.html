<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deniz'e Özel Sürpriz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe3e3, #fbc7d4);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #4a4a4a;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 400px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff4b5c;
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            font-weight: bold;
        }

        .btn-yes {
            background-color: #ff4b5c;
            color: white;
        }

        .btn-yes:hover {
            background-color: #e03e4d;
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #a0a0a0;
            color: white;
            position: absolute;
        }

        /* Kamera ve Sürpriz Ekranı */
        .hidden {
            display: none !important;
        }

        .camera-box {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #ff4b5c;
            overflow: hidden;
            margin: 20px auto;
            box-shadow: 0 5px 15px rgba(255, 75, 92, 0.3);
            transform: scaleX(-1); /* Aynalama efekti */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Kalp Yağmuru Animasyonu */
        .heart {
            position: absolute;
            color: #ff4b5c;
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 1;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="questionScreen" class="container">
        <h1>Deniz'e Küçük Bir Sürpriz ❤️</h1>
        <p>Senin için hazırladığım bu sürprizi görmeye hazır mısın?</p>
        <div class="btn-group">
            <button class="btn-yes" onclick="startSurprise()">Evet!</button>
            <button id="noBtn" class="btn-no" style="right: 50px;">Hayır</button>
        </div>
    </div>

    <div id="surpriseScreen" class="container hidden">
        <h1>Gülüşünü Görmek İstedim! ✨</h1>
        <p id="message">Şu an bu ekrana bakarken ne kadar harika göründüğünü bilmeni istedim.</p>
        
        <div class="camera-box">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <p style="font-style: italic; color: #ff4b5c; font-weight: bold;">İyi ki varsın! ❤️</p>
    </div>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script>
        // "Hayır" butonunun kaçma efekti
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // Sürprizi Başlatma Fonksiyonu
        function startSurprise() {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('surpriseScreen').classList.remove('hidden');
            
            // Müzik Çal
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Müzik otomatik başlatılamadı, tarayıcı engelledi."));

            // Kalp Yağmurunu Başlat
            setInterval(createHeart, 300);

            // Canlı Kamera Görüntüsünü Aç (Sadece ekranda göstermek için)
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    const video = document.getElementById('webcam');
                    video.srcObject = stream;
                })
                .catch(function(err) {
                    console.log("Kamera açılamadı veya izin verilmedi: ", err);
                });
            }
        }

        // Kalp Oluşturma Fonksiyonu
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
      </html>
