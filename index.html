    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;

            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff1f3;
        }

        .container {
            text-align: center;
            padding: 35px 25px;
            background: rgba(20, 5, 13, 0.75);
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 75, 92, 0.15);
            backdrop-filter: blur(15px);
            max-width: 90%;
            width: 480px;
            z-index: 10;
            border: 1px solid rgba(255, 101, 132, 0.2);
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 26px;
            color: #ff6584;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 101, 132, 0.4);
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #ffe4e8;
        }

        .highlight {
            color: #ff4b5c;
            font-weight: bold;
            font-size: 20px;
            display: block;
            margin: 15px 0;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            background: linear-gradient(45deg, #ff4b5c, #ff6584);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 75, 92, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 75, 92, 0.5);
        }

        button.alt-btn {
            background: linear-gradient(45deg, #4a1525, #6b2138);
            border: 1px solid rgba(255, 101, 132, 0.3);
        }

        .progress-bar {
            font-size: 13px;
            color: #a68590;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Kalp Efekti */
        .heart {
            position: absolute;
            color: rgba(255, 75, 92, 0.35);
            animation: floatUp linear forwards;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1.2); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
